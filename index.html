<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>HUMAN IN BETA — The Beta Node</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage" aria-label="Renegade-style BBS">
    <section class="bezel">
      <div class="crt" role="application" aria-label="BBS Terminal">
        <div class="glass">

          <header class="top">
            <div class="logo-panel" aria-label="HUMAN IN BETA Logo">
              <canvas id="logo" class="logo-canvas" aria-hidden="true"></canvas>
            </div>

            <div class="headerline">
              <span class="bracket y">[THE BETA NODE]</span>
              <span class="rule dim">────────────────────────────────────────────────────────────────</span>
              <span class="right c">Node 1&nbsp;&nbsp;2400 Baud</span>
            </div>
          </header>

          <section class="term" aria-label="Terminal output">
            <pre id="term" class="term-pre" aria-live="polite"></pre>
          </section>

          <footer class="promptbar" aria-label="Command prompt">
            <div class="prompt-left">
              <span class="c">Main Board Command?</span>
              <span id="cmdEcho" class="cmd-echo y" aria-label="Command buffer"></span>
              <span class="cursor y" aria-hidden="true">_</span>
            </div>

            <!-- focusable hidden input captures typing -->
            <input
              id="kbd"
              class="kbd"
              autocomplete="off"
              autocapitalize="none"
              spellcheck="false"
              inputmode="text"
            />
          </footer>

        </div>
      </div>
    </section>
  </main>

  <!-- IMPORTANT: order + defer -->
  <script src="logo.js" defer></script>
  <script src="app.js" defer></script>
</body>
</html>
