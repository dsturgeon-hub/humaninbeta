<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>HUMAN IN BETA — The Beta Node</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage" aria-label="Renegade-style BBS">
    <section class="bezel">
      <div class="crt" role="application" aria-label="BBS Terminal">
        <div class="glass">
          <header class="top">
            <!-- Logo is CSS-driven for the effects -->
            <!-- <div class="logo-wrap">
              <div class="logo-glitch shatter" data-text="HUMAN IN BETA">HUMAN IN BETA</div>
              <div class="tagline y">── THE BETA NODE ──</div>
            </div> -->
            <div class="logo-ref" aria-label="HUMAN IN BETA logo">
              <div class="streaks" aria-hidden="true"></div>
              <div class="text" data-text="HUMAN IN BETA">HUMAN IN BETA</div>
            </div>
            <div class="headerline">
              <span class="bracket y">[THE BETA NODE]</span>
              <span class="rule dim">──────────────────────────────────────────────</span>
              <span class="right c">Node 1&nbsp;&nbsp;2400 Baud</span>
            </div>
          </header>

          <!-- Fixed-height terminal viewport (never grows). JS writes lines here. -->
          <section class="term" aria-label="Terminal output">
            <pre id="term" class="term-pre" aria-live="polite"></pre>
          </section>

          <footer class="promptbar" aria-label="Command prompt">
            <div class="prompt-left">
              <span class="c">Main Board Command?</span>
              <span class="cursor y" aria-hidden="true">_</span>
            </div>

            <!-- Hidden input captures typing; prompt rendering stays fixed -->
            <input id="kbd" class="kbd" autocomplete="off" spellcheck="false" inputmode="text" />
          </footer>
        </div>
      </div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
